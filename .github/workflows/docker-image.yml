name: Docker image

# Show the target in the run list instead of a generic "Docker image #N".
# Manual runs => the chosen target; pushes => the commit that triggered them.
run-name: >-
  ${{ github.event_name == 'workflow_dispatch'
      && format('Build {0}', github.event.inputs.target)
      || format('Build (push) {0}', github.event.head_commit.message) }}

# All images now live on the main branch as ./<name>/Dockerfile, and their
# build-order dependencies are declared in deps.mk (consumed by the Makefile).
# Adding a new image == adding a new ./<name>/Dockerfile (+ an edge in deps.mk);
# this workflow needs no changes for new images.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Image dir to build, or 'all'. Empty = same as 'all'."
        required: false
        default: "all"
  push:

jobs:
  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need the previous commit to diff changed dirs

      # deps.mk is generated from the Dockerfiles; fail if it wasn't regenerated.
      - name: Check deps.mk is up to date
        run: make deps-check

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Decide what to build:
      #   - manual run  -> the chosen input (default: all)
      #   - push        -> only the image dirs whose files changed in this push
      #                    (deps.mk makes `make` build their parents first)
      # Shared infra changes (Makefile/deps.mk/workflow) rebuild everything.
      - name: Select targets
        id: sel
        env:
          EVENT: ${{ github.event_name }}
          INPUT: ${{ github.event.inputs.target }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "targets=${INPUT:-all}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          if echo "$changed" | grep -qE '^(Makefile|deps\.mk|\.github/)'; then
            echo "targets=all" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # top-level dirs that have a Dockerfile and changed in this push
          targets=$(echo "$changed" \
            | grep -E '^[^/]+/' \
            | cut -d/ -f1 \
            | sort -u \
            | while read d; do [ -f "$d/Dockerfile" ] && echo "$d"; done \
            | tr '\n' ' ')
          echo "targets=${targets:-}" >> "$GITHUB_OUTPUT"

      - name: docker build & push
        if: steps.sel.outputs.targets != ''
        run: |
          echo "Building: ${{ steps.sel.outputs.targets }}"
          make -j1 PUSH=1 ${{ steps.sel.outputs.targets }}
